<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Library — Browse and watch your transcoded videos." />
  <title>StreamForge · Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgb(255 255 255 / 0.04) 25%, rgb(255 255 255 / 0.08) 50%, rgb(255 255 255 / 0.04) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s ease infinite;
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased">

  <!-- ── STICKY HEADER ─────────────────────────────────────────────── -->
  <header class="sticky top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/80 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-7xl items-center justify-between px-6">
      <!-- Brand -->
      <div class="flex items-center gap-2.5">
        <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="1" width="4.5" height="12" rx="1"/>
            <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
          </svg>
        </span>
        <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
        <span id="videoCount" class="hidden ml-1.5 rounded-full bg-white/[0.08] px-2 py-0.5 text-[11px] font-medium text-zinc-400 tabular-nums"></span>
      </div>
      <!-- Nav -->
      <div class="flex items-center gap-2">
        <span class="hidden sm:block text-sm text-zinc-300 bg-white/[0.06] rounded-lg px-3 py-1.5 font-medium">Library</span>
        <a
          href="/upload/"
          class="flex items-center gap-1.5 rounded-lg bg-rose-600 px-3.5 py-1.5 text-sm font-semibold text-white shadow shadow-rose-900/40
                 transition hover:bg-rose-500 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-rose-500/40"
        >
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
          </svg>
          Upload
        </a>
      </div>
    </div>
  </header>

  <!-- ── CONTENT ───────────────────────────────────────────────────── -->
  <main class="mx-auto max-w-7xl px-6 py-10">
    <!-- Page title row -->
    <div class="mb-8 flex items-center justify-between">
      <h1 class="text-xl font-bold tracking-tight text-white">All videos</h1>
    </div>

    <!-- Skeleton loaders (shown while fetching) -->
    <div id="skeletons" class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      <!-- 4 placeholder cards -->
      <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden">
        <div class="skeleton aspect-video w-full"></div>
        <div class="p-4 space-y-2.5">
          <div class="skeleton h-4 w-3/4 rounded-lg"></div>
          <div class="skeleton h-3 w-1/3 rounded-lg"></div>
        </div>
      </div>
      <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden">
        <div class="skeleton aspect-video w-full"></div>
        <div class="p-4 space-y-2.5">
          <div class="skeleton h-4 w-2/3 rounded-lg"></div>
          <div class="skeleton h-3 w-1/4 rounded-lg"></div>
        </div>
      </div>
      <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden">
        <div class="skeleton aspect-video w-full"></div>
        <div class="p-4 space-y-2.5">
          <div class="skeleton h-4 w-4/5 rounded-lg"></div>
          <div class="skeleton h-3 w-1/3 rounded-lg"></div>
        </div>
      </div>
      <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden">
        <div class="skeleton aspect-video w-full"></div>
        <div class="p-4 space-y-2.5">
          <div class="skeleton h-4 w-1/2 rounded-lg"></div>
          <div class="skeleton h-3 w-1/4 rounded-lg"></div>
        </div>
      </div>
    </div>

    <!-- Video grid (populated by JS) -->
    <div id="grid" class="hidden grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 animate-fade-up"></div>

    <!-- Empty state (shown if no videos) -->
    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-28 text-center animate-fade-up">
      <div class="mb-5 flex h-14 w-14 items-center justify-center rounded-2xl border border-white/[0.08] bg-white/[0.04]">
        <svg class="h-7 w-7 text-zinc-500" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>
      <h3 class="text-base font-semibold text-white mb-1">No videos yet</h3>
      <p class="text-sm text-zinc-500 mb-6 max-w-xs">Upload your first video and StreamForge will transcode it automatically.</p>
      <a href="/upload/" class="rounded-xl bg-rose-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-500">
        Upload a video
      </a>
    </div>
  </main>

  <!-- ── SCRIPTS (logic 100% untouched) ──────────────────────────────── -->
  <script>
    async function loadLibrary() {
        const res = await fetch('/api/videos/');
        const videos = await res.json();
        const grid = document.getElementById('grid');

        // Hide skeletons
        document.getElementById('skeletons').classList.add('hidden');

        if (videos.length === 0) {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('flex');
            return;
        }

        // Show count
        const countEl = document.getElementById('videoCount');
        countEl.innerText = videos.length;
        countEl.classList.remove('hidden');

        // Show grid
        grid.classList.remove('hidden');

        videos.forEach(vid => {
            const isDone = vid.status === 'done';
            const link = isDone ? `/player/?id=${vid.id}` : '#';

            // Card styling based on status
            const cardClass = isDone ? 'hover:-translate-y-2 hover:shadow-2xl hover:shadow-rose-500/10' : 'opacity-60 cursor-not-allowed';
            const thumb = vid.thumbnail ? vid.thumbnail : 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop';

            const badge = isDone
                ? '<span class="absolute top-3 right-3 bg-emerald-500/90 backdrop-blur text-white text-xs font-bold px-2.5 py-1 rounded-md shadow-lg">READY</span>'
                : '<span class="absolute top-3 right-3 bg-amber-500/90 backdrop-blur text-black text-xs font-bold px-2.5 py-1 rounded-md shadow-lg animate-pulse">PROCESSING</span>';

            grid.innerHTML += `
                <a href="${link}" class="group block relative transition-all duration-300 bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden ${cardClass}">
                    <div class="aspect-video relative overflow-hidden bg-slate-900">
                        <img src="${thumb}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-80"></div>
                        ${badge}
                    </div>
                    <div class="p-5">
                        <h3 class="text-lg font-bold text-white truncate mb-1">${vid.title}</h3>
                        <p class="text-xs text-slate-500 font-mono">${new Date(vid.created_at).toLocaleDateString()}</p>
                    </div>
                </a>
            `;
        });
    }
    loadLibrary();
  </script>
</body>

</html>
