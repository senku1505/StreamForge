<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Library — Browse and watch your transcoded videos." />
  <title>StreamForge · Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgb(255 255 255 / 0.03) 25%, rgb(255 255 255 / 0.07) 50%, rgb(255 255 255 / 0.03) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.6s ease infinite;
    }

    .card-thumb { transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .card-link:hover .card-thumb { transform: scale(1.04); }
    .card-play  { opacity: 0; transition: opacity 0.2s; }
    .card-link:hover .card-play  { opacity: 1; }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased">

  <header class="sticky top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/80 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-6">
      <div class="flex items-center gap-2">
        <a href="/" class="flex items-center gap-2.5 group">
          <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
            <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
              <rect x="1" y="1" width="4.5" height="12" rx="1"/>
              <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
            </svg>
          </span>
          <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
        </a>
        <span id="videoCount" class="hidden ml-1 rounded-full bg-white/[0.07] px-2 py-0.5 text-[11px] font-medium text-zinc-500 tabular-nums"></span>
      </div>
      <div class="flex items-center gap-2">
        <a href="/about/" class="hidden sm:block rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">About</a>
        <span class="hidden sm:block rounded-lg px-3 py-1.5 text-sm font-medium text-zinc-300 bg-white/[0.06]">Library</span>
        <a href="/upload/"
          class="flex items-center gap-1.5 rounded-lg bg-rose-600 px-3.5 py-1.5 text-sm font-semibold text-white
                 transition hover:bg-rose-500 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-rose-500/40">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
          </svg>
          Upload
        </a>
      </div>
    </div>
  </header>

  <!-- ── MAIN ──────────────────────────────────────────────────────── -->
  <main class="mx-auto max-w-6xl px-6 py-10">
    <div class="mb-8">
      <h1 class="text-xl font-bold tracking-tight text-white">All videos</h1>
      <p class="mt-1 text-sm text-zinc-600">Your processed and ready-to-watch videos · Served via HLS</p>
    </div>

    <!-- Skeleton loaders -->
    <div id="skeletons" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <div class="rounded-2xl border border-white/[0.05] overflow-hidden bg-white/[0.02]"><div class="skeleton aspect-video w-full"></div><div class="p-4 space-y-2.5"><div class="skeleton h-4 w-3/4 rounded-lg"></div><div class="skeleton h-3 w-1/3 rounded-lg"></div></div></div>
      <div class="rounded-2xl border border-white/[0.05] overflow-hidden bg-white/[0.02]"><div class="skeleton aspect-video w-full"></div><div class="p-4 space-y-2.5"><div class="skeleton h-4 w-2/3 rounded-lg"></div><div class="skeleton h-3 w-1/4 rounded-lg"></div></div></div>
      <div class="rounded-2xl border border-white/[0.05] overflow-hidden bg-white/[0.02]"><div class="skeleton aspect-video w-full"></div><div class="p-4 space-y-2.5"><div class="skeleton h-4 w-4/5 rounded-lg"></div><div class="skeleton h-3 w-1/3 rounded-lg"></div></div></div>
    </div>

    <!-- Video grid -->
    <div id="grid" class="hidden grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 animate-fade-up"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden">
      <div class="flex flex-col items-center justify-center py-32 text-center animate-fade-up">
        <div class="mb-5 flex h-16 w-16 items-center justify-center rounded-2xl border border-white/[0.07] bg-white/[0.03]">
          <svg class="h-8 w-8 text-zinc-600" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/>
          </svg>
        </div>
        <h3 class="text-base font-semibold text-white mb-1.5">No videos yet</h3>
        <p class="text-sm text-zinc-500 mb-7 max-w-xs leading-relaxed">Upload your first video and StreamForge will transcode it to HLS automatically.</p>
        <a href="/upload/" class="rounded-xl bg-rose-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-500 active:scale-[0.98]">Upload a video</a>
      </div>
    </div>
  </main>

  <script>
    function fmtDuration(secs) {
      if (!secs) return null;
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    async function loadLibrary() {
      const res    = await fetch('/api/videos/');
      const videos = await res.json();
      const grid   = document.getElementById('grid');

      document.getElementById('skeletons').classList.add('hidden');

      if (videos.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      const countEl = document.getElementById('videoCount');
      countEl.innerText = videos.length;
      countEl.classList.remove('hidden');

      grid.classList.remove('hidden');
      grid.classList.add('grid');

      videos.forEach(vid => {
        const isDone   = vid.status === 'done';
        const link     = isDone ? `/player/?id=${vid.id}` : '#';
        const thumb    = vid.thumbnail || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop';
        const duration = fmtDuration(vid.duration);

        const badge = isDone
          ? `<span class="absolute top-3 right-3 flex items-center gap-1 rounded-md bg-emerald-500/90 backdrop-blur-sm px-2 py-0.5 text-[10px] font-bold text-white tracking-wide">
               <span class="h-1.5 w-1.5 rounded-full bg-white/80"></span>READY
             </span>`
          : `<span class="absolute top-3 right-3 flex items-center gap-1 rounded-md bg-amber-500/90 backdrop-blur-sm px-2 py-0.5 text-[10px] font-bold text-black tracking-wide animate-pulse">
               <span class="h-1.5 w-1.5 rounded-full bg-black/50"></span>PROCESSING
             </span>`;

        const durationEl = duration
          ? `<span class="absolute bottom-3 left-3 rounded bg-black/70 backdrop-blur-sm px-1.5 py-0.5 text-[11px] font-semibold tabular-nums text-white">${duration}</span>`
          : '';

        const playBtn = isDone
          ? `<div class="card-play absolute inset-0 flex items-center justify-center z-10">
               <div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 backdrop-blur-md border border-white/20 shadow-xl">
                 <svg class="h-5 w-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
               </div>
             </div>` : '';

        const cursorClass = isDone ? '' : 'pointer-events-none';

        grid.innerHTML += `
          <div id="video-card-${vid.id}" class="card-link group block rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden
                                  transition-all duration-300 hover:border-white/[0.12] hover:bg-white/[0.04] hover:shadow-xl hover:shadow-black/40
                                  relative ${isDone ? '' : 'opacity-70'}">
            <!-- Wrap image & overlay in link -->
            <a href="${link}" class="${cursorClass}">
              <div class="relative aspect-video overflow-hidden bg-zinc-900">
                <img src="${thumb}" alt="${vid.title}" class="card-thumb w-full h-full object-cover" loading="lazy" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                ${badge}
                ${durationEl}
                ${playBtn}
              </div>
            </a>
            <div class="p-4 flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <a href="${link}" class="${cursorClass}">
                  <h3 class="text-sm font-semibold text-white truncate mb-1 group-hover:text-zinc-100">${vid.title}</h3>
                </a>
                <div class="flex items-center justify-between">
                  <p class="text-xs text-zinc-600">${new Date(vid.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}</p>
                  ${isDone ? '<span class="text-xs text-zinc-600">HLS · 1080p · 720p</span>' : ''}
                </div>
              </div>
              <button
                onclick="deleteVideo(event, ${vid.id})"
                class="rounded-lg p-1.5 text-zinc-400 hover:bg-rose-500/10 hover:text-rose-500 transition flex-shrink-0"
                title="Delete video"
              >
                <svg class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
                </svg>
              </button>
            </div>
          </div>`;
      });
    }

    async function deleteVideo(event, id) {
      event.preventDefault();
      event.stopPropagation();

      if (!confirm("Are you sure you want to delete this video? All transcoded HLS streams and files will be permanently deleted from the disk.")) return;

      const res = await fetch(`/api/videos/${id}/`, {
        method: 'DELETE',
        headers: {
          'X-CSRFToken': getCookie('csrftoken')
        }
      });

      if (res.ok) {
        const card = document.getElementById(`video-card-${id}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.9)';
          setTimeout(() => {
            card.remove();
            // Show empty state if no videos left
            const grid = document.getElementById('grid');
            if (grid.children.length === 0) {
              grid.classList.add('hidden');
              document.getElementById('emptyState').classList.remove('hidden');
            }
          }, 300);
        }
      } else {
        alert("Failed to delete video.");
      }
    }

    // Helper to get CSRF token
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    loadLibrary();
  </script>
</body>
</html>
