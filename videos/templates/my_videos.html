<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Library — Watch adaptive HLS video streams." />
  <title>StreamForge · My Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 14 14%22 fill=%22%23f43f5e%22><rect x=%221%22 y=%221%22 width=%224.5%22 height=%2212%22 rx=%221%22/><rect x=%228.5%22 y=%221%22 width=%224.5%22 height=%2212%22 rx=%221%22/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }

    .skeleton {
      background: linear-gradient(90deg, rgb(255 255 255 / 0.03) 25%, rgb(255 255 255 / 0.08) 50%, rgb(255 255 255 / 0.03) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    @keyframes loading {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR (Authenticated Layout) ────────────────────────────────── -->
  <header class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/80 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
      <a href="/about/" class="flex items-center gap-2.5 group">
        <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="1" width="4.5" height="12" rx="1"/>
            <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
          </svg>
        </span>
        <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
      </a>
      
      <!-- Nav menu linking feed and personal pages -->
      <div class="flex items-center gap-2">
        <a href="/library/" class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">Public Feed</a>
        <span class="rounded-lg px-3 py-1.5 text-sm font-medium text-zinc-300 bg-white/[0.06]">My Studio</span>
        <a href="/upload/" class="flex items-center gap-1.5 rounded-lg bg-rose-600 px-3.5 py-1.5 text-sm font-semibold text-white transition hover:bg-rose-500 active:scale-[0.97] mr-1">
          Upload
        </a>
        <!-- Logout button exactly to the right of Upload -->
        <button onclick="handleLogout()" class="rounded-lg border border-white/[0.08] bg-white/[0.03] px-3.5 py-1.5 text-sm font-semibold text-zinc-400 transition hover:bg-white/[0.07] hover:text-white">
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- ── MAIN (Personal Pool Feed) ───────────────────────────────────── -->
  <main class="mx-auto max-w-6xl px-6 py-10 pt-20 flex-1 w-full">
    <div class="mb-8">
      <h1 class="text-xl font-bold tracking-tight text-white">My Studio</h1>
      <p class="mt-1 text-sm text-zinc-500">Manage and delete videos from your personal pool.</p>
    </div>

    <!-- skeletons while loading -->
    <div id="skeletons" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <div class="rounded-2xl border border-white/[0.05] overflow-hidden bg-white/[0.02]"><div class="skeleton aspect-video w-full"></div><div class="p-4 space-y-2.5"><div class="skeleton h-4 w-3/4 rounded-lg"></div><div class="skeleton h-3 w-1/3 rounded-lg"></div></div></div>
      <div class="rounded-2xl border border-white/[0.05] overflow-hidden bg-white/[0.02]"><div class="skeleton aspect-video w-full"></div><div class="p-4 space-y-2.5"><div class="skeleton h-4 w-2/3 rounded-lg"></div><div class="skeleton h-3 w-1/4 rounded-lg"></div></div></div>
    </div>

    <!-- main card grid -->
    <div id="grid" class="hidden grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 animate-fade-up"></div>

    <!-- empty list page -->
    <div id="emptyState" class="hidden">
      <div class="flex flex-col items-center justify-center py-32 text-center animate-fade-up">
        <div class="mb-5 flex h-16 w-16 items-center justify-center rounded-2xl border border-white/[0.07] bg-white/[0.03]">
          <svg class="h-8 w-8 text-zinc-600" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/>
          </svg>
        </div>
        <h3 class="text-base font-semibold text-white mb-1.5">No videos in your pool</h3>
        <p class="text-sm text-zinc-500 mb-7 max-w-xs leading-relaxed">Upload a video to your personal studio page to start processing.</p>
        <a href="/upload/" class="rounded-xl bg-rose-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-500 active:scale-[0.98]">Upload a video</a>
      </div>
    </div>
  </main>

  <script>
    let previewInterval = null;

    // verify authentication
    const token = localStorage.getItem('sf_token');
    if (!token) {
      window.location.href = '/login/';
    }

    function handleLogout() {
      localStorage.removeItem('sf_token');
      localStorage.removeItem('sf_username');
      window.location.href = '/about/';
    }

    // convert seconds to min:sec format
    function fmtDuration(secs) {
      if (!secs) return null;
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // animate background coordinates of dynamic sprite preview
    function startSpritePreview(el, spriteUrl, duration) {
      if (!spriteUrl || !duration) return;
      const numFrames = Math.ceil(duration / 5);
      const cols = Math.min(10, numFrames);
      const rows = Math.ceil(numFrames / cols);
      
      let frame = 0;
      el.style.backgroundImage = `url(${spriteUrl})`;
      el.style.backgroundSize = `${cols * 100}% ${rows * 100}%`;
      el.style.backgroundPosition = '0% 0%';
      el.classList.replace('opacity-0', 'opacity-100');
      
      clearInterval(previewInterval);
      previewInterval = setInterval(() => {
        frame = (frame + 1) % numFrames;
        const col = frame % cols;
        const row = Math.floor(frame / cols);
        
        const pctX = cols > 1 ? (col / (cols - 1)) * 100 : 0;
        const pctY = rows > 1 ? (row / (rows - 1)) * 100 : 0;
        
        el.style.backgroundPosition = `${pctX}% ${pctY}%`;
      }, 350);
    }

    function stopSpritePreview(el) {
      clearInterval(previewInterval);
      el.classList.replace('opacity-100', 'opacity-0');
      el.style.backgroundImage = '';
    }

    async function loadLibrary() {
      const res = await fetch('/api/videos/personal/', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) {
        handleLogout();
        return;
      }
      const videos = await res.json();
      const grid   = document.getElementById('grid');

      document.getElementById('skeletons').classList.add('hidden');

      if (videos.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      grid.classList.replace('hidden', 'grid');

      videos.forEach(vid => {
        const isDone = vid.status === 'done';
        const link   = isDone ? `/player/?id=${vid.id}` : '#';
        const thumb  = vid.thumbnail || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=640&q=80';
        const duration = fmtDuration(vid.duration);

        const badge = isDone
          ? `<span class="absolute top-3 left-3 flex items-center gap-1 rounded-md bg-emerald-500/90 backdrop-blur-sm px-2 py-0.5 text-[10px] font-bold text-white tracking-wide z-20">
               <span class="h-1.5 w-1.5 rounded-full bg-white/80"></span>READY
             </span>`
          : `<span class="absolute top-3 left-3 flex items-center gap-1 rounded-md bg-amber-500/90 backdrop-blur-sm px-2 py-0.5 text-[10px] font-bold text-black tracking-wide animate-pulse z-20">
               <span class="h-1.5 w-1.5 rounded-full bg-black/50"></span>PROCESSING
             </span>`;

        const durationEl = duration
          ? `<span class="absolute bottom-3 right-3 rounded bg-black/70 backdrop-blur-sm px-1.5 py-0.5 text-[11px] font-semibold tabular-nums text-white z-20">${duration}</span>`
          : '';

        const playBtn = isDone
          ? `<div class="card-play absolute inset-0 flex items-center justify-center z-10">
               <div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 backdrop-blur-md border border-white/20 shadow-xl">
                 <svg class="h-5 w-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
               </div>
             </div>` : '';

        const cursorClass = isDone ? '' : 'pointer-events-none';

        grid.innerHTML += `
          <div id="video-card-${vid.id}" class="card-link group block rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden
                                  transition-all duration-300 hover:border-white/[0.12] hover:bg-white/[0.04] hover:shadow-xl hover:shadow-black/40
                                  relative ${isDone ? '' : 'opacity-70'}">
            
            <a href="${link}" class="${cursorClass}" 
               onmouseenter="startSpritePreview(document.getElementById('preview-${vid.id}'), '${vid.sprite_sheet}', ${vid.duration})"
               onmouseleave="stopSpritePreview(document.getElementById('preview-${vid.id}'))">
              
              <div class="relative aspect-video overflow-hidden bg-zinc-900">
                <img src="${thumb}" alt="${vid.title}" class="card-thumb w-full h-full object-cover" loading="lazy" />
                <div id="preview-${vid.id}" class="absolute inset-0 bg-no-repeat opacity-0 transition-opacity duration-200 pointer-events-none z-10"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent z-10"></div>
                ${badge}
                ${durationEl}
                ${playBtn}
              </div>
            </a>
            
            <!-- delete button top right (works since this page is authenticated) -->
            <button
              onclick="deleteVideo(event, ${vid.id})"
              class="absolute top-3 right-3 z-30 flex h-7 w-7 items-center justify-center rounded-lg bg-black/60 backdrop-blur-md border border-white/10 text-zinc-400 opacity-0 group-hover:opacity-100 transition-all duration-200 hover:bg-rose-600 hover:text-white hover:border-rose-500"
              title="Delete video"
            >
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
              </svg>
            </button>

            <div class="p-4">
              <a href="${link}" class="${cursorClass}">
                <h3 class="text-sm font-semibold text-white truncate mb-1 group-hover:text-zinc-100">${vid.title}</h3>
              </a>
              <div class="flex items-center justify-between">
                <p class="text-xs text-zinc-500">${new Date(vid.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}</p>
                ${isDone ? '<span class="text-[11px] text-zinc-500 font-medium">HLS · 1080p · 720p</span>' : ''}
              </div>
            </div>
          </div>`;
      });
    }

    async function deleteVideo(event, id) {
      event.preventDefault();
      event.stopPropagation();

      if (!confirm("Are you sure you want to delete this video from your personal studio?")) return;

      const res = await fetch(`/api/videos/${id}/`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 204) {
        const card = document.getElementById(`video-card-${id}`);
        card.style.opacity = '0';
        card.style.transform = 'scale(0.95)';
        setTimeout(() => {
          card.remove();
          if (document.querySelectorAll('.card-link').length === 0) {
            document.getElementById('grid').classList.replace('grid', 'hidden');
            document.getElementById('emptyState').classList.remove('hidden');
          }
        }, 300);
      } else {
        alert("Failed to delete video. Only the owner can delete.");
      }
    }

    loadLibrary();
  </script>
</body>
</html>
