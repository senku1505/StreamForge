<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Player — Watch your transcoded video." />
  <title>StreamForge · Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    /* Remove default video chrome on webkit */
    video::-webkit-media-controls { border-radius: 0 0 1rem 1rem; }
    video { display: block; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .dot-pulse { animation: dot-pulse 1.8s ease-in-out infinite; }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR ───────────────────────────────────────────────────────── -->
  <header class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/90 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
      <a href="/library/" class="flex items-center gap-2.5 group">
        <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="1" width="4.5" height="12" rx="1"/>
            <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
          </svg>
        </span>
        <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
      </a>
      <a
        href="/library/"
        class="flex items-center gap-1.5 text-sm text-zinc-400 transition hover:text-zinc-200 group"
      >
        <svg class="h-4 w-4 transition-transform group-hover:-translate-x-0.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
        </svg>
        Library
      </a>
    </div>
  </header>

  <!-- ── MAIN ─────────────────────────────────────────────────────────── -->
  <main class="flex flex-1 flex-col pt-14">

    <!-- Video stage — full width, nearly full height feel -->
    <div class="w-full bg-black">
      <div class="mx-auto max-w-6xl px-0 sm:px-6 xl:px-0">
        <div class="relative overflow-hidden sm:rounded-b-2xl shadow-2xl shadow-black/80 border-b border-x border-white/[0.06] sm:border-t-0">
          <video
            id="videoPlayer"
            controls
            crossorigin="anonymous"
            class="w-full aspect-video outline-none bg-black"
          ></video>
        </div>
      </div>
    </div>

    <!-- Metadata + Controls -->
    <div class="mx-auto w-full max-w-6xl px-6 py-8 animate-fade-up">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">

        <!-- Title & status -->
        <div class="min-w-0 flex-1">
          <h1 id="videoTitle" class="text-2xl font-bold tracking-tight text-white truncate mb-2">Loading…</h1>
          <div class="flex items-center gap-2 text-sm text-zinc-500">
            <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 dot-pulse flex-shrink-0"></span>
            <span>Streaming from StreamForge Engine</span>
          </div>
        </div>

        <!-- Quality switcher -->
        <div class="flex-shrink-0">
          <p class="mb-2 text-xs font-medium text-zinc-500 sm:text-right">Quality</p>
          <div class="flex gap-1 rounded-xl border border-white/[0.08] bg-white/[0.04] p-1">
            <button
              onclick="switchRes('480')"
              id="btn480"
              class="rounded-lg px-4 py-1.5 text-sm font-semibold text-zinc-400 transition-all duration-150 hover:text-zinc-200"
            >480p</button>
            <button
              onclick="switchRes('720')"
              id="btn720"
              class="rounded-lg bg-rose-600 px-4 py-1.5 text-sm font-semibold text-white shadow transition-all duration-150"
            >720p HD</button>
          </div>
        </div>
      </div>

      <!-- Divider -->
      <div class="mt-8 border-t border-white/[0.06]"></div>

      <!-- Bottom nav hint -->
      <div class="mt-6 flex items-center justify-between text-xs text-zinc-600">
        <span>StreamForge · Adaptive streaming</span>
        <a href="/upload/" class="transition hover:text-zinc-400">Upload another →</a>
      </div>
    </div>
  </main>

  <!-- ── SCRIPTS (logic 100% untouched) ──────────────────────────────── -->
  <script>
    let currentVideoData = null;
    const player = document.getElementById('videoPlayer');

    async function loadVideo() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) return document.getElementById('videoTitle').innerText = "Video Not Found";

        const res = await fetch(`/api/videos/${id}/`);
        currentVideoData = await res.json();

        document.getElementById('videoTitle').innerText = currentVideoData.title;
        player.poster = currentVideoData.thumbnail;

        switchRes('720');
    }

    function switchRes(res) {
        const time = player.currentTime;
        const isPaused = player.paused;

        player.src = res === '720' ? currentVideoData.video_720 : currentVideoData.video_480;
        player.currentTime = time;
        if (!isPaused) player.play();

        // UI Toggle
        if (res === '720') {
            document.getElementById('btn720').className = "rounded-lg bg-rose-600 px-4 py-1.5 text-sm font-semibold text-white shadow transition-all duration-150";
            document.getElementById('btn480').className = "rounded-lg px-4 py-1.5 text-sm font-semibold text-zinc-400 transition-all duration-150 hover:text-zinc-200";
        } else {
            document.getElementById('btn480').className = "rounded-lg bg-rose-600 px-4 py-1.5 text-sm font-semibold text-white shadow transition-all duration-150";
            document.getElementById('btn720').className = "rounded-lg px-4 py-1.5 text-sm font-semibold text-zinc-400 transition-all duration-150 hover:text-zinc-200";
        }
    }

    loadVideo();
  </script>
</body>

</html>
