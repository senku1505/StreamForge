<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>StreamForge | Player</title>
</head>

<body class="bg-black text-white min-h-screen flex flex-col items-center p-4 md:p-8">
    <div class="w-full max-w-6xl mx-auto">
        <a href="/library/"
            class="group flex items-center text-slate-400 hover:text-white mb-6 transition-colors w-max">
            <span class="mr-2 transform group-hover:-translate-x-1 transition-transform">&larr;</span> Back to Library
        </a>

        <div
            class="relative rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-slate-800 bg-slate-900">
            <video id="videoPlayer" controls class="w-full aspect-video outline-none" crossorigin="anonymous"></video>
        </div>

        <div class="mt-8 flex flex-col md:flex-row md:items-start justify-between gap-4">
            <div>
                <h1 id="videoTitle" class="text-3xl md:text-4xl font-black tracking-tight text-white mb-2">Loading...
                </h1>
                <p class="text-slate-400 text-sm font-mono flex items-center">
                    <span class="h-2 w-2 rounded-full bg-emerald-500 mr-2"></span> Streaming from StreamForge Engine
                </p>
            </div>

            <div class="flex space-x-2 bg-slate-800/80 backdrop-blur p-1.5 rounded-lg border border-slate-700 h-max">
                <button onclick="switchRes('480')" id="btn480"
                    class="px-5 py-2 text-sm font-bold rounded-md text-slate-400 hover:text-white transition-colors">480p</button>
                <button onclick="switchRes('720')" id="btn720"
                    class="px-5 py-2 text-sm font-bold rounded-md bg-rose-600 text-white shadow-md transition-colors">720p
                    HD</button>
            </div>
        </div>
    </div>

    <script>
        let currentVideoData = null;
        const player = document.getElementById('videoPlayer');

        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) return document.getElementById('videoTitle').innerText = "Video Not Found";

            const res = await fetch(`/api/videos/${id}/`);
            currentVideoData = await res.json();

            document.getElementById('videoTitle').innerText = currentVideoData.title;
            player.poster = currentVideoData.thumbnail;

            switchRes('720');
        }

        function switchRes(res) {
            const time = player.currentTime;
            const isPaused = player.paused;

            player.src = res === '720' ? currentVideoData.video_720 : currentVideoData.video_480;
            player.currentTime = time;
            if (!isPaused) player.play();

            // UI Toggle
            if (res === '720') {
                document.getElementById('btn720').className = "px-5 py-2 text-sm font-bold rounded-md bg-rose-600 text-white shadow-md transition-colors";
                document.getElementById('btn480').className = "px-5 py-2 text-sm font-bold rounded-md text-slate-400 hover:text-white transition-colors";
            } else {
                document.getElementById('btn480').className = "px-5 py-2 text-sm font-bold rounded-md bg-rose-600 text-white shadow-md transition-colors";
                document.getElementById('btn720').className = "px-5 py-2 text-sm font-bold rounded-md text-slate-400 hover:text-white transition-colors";
            }
        }

        loadVideo();
    </script>
</body>

</html>
