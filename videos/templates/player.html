<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Player — Adaptive HLS video streaming." />
  <title>StreamForge · Player</title>

  <!-- Plyr CSS & JS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <!-- Hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Tailwind + Inter -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body { font-family: 'Inter', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .dot-pulse { animation: dot-pulse 1.8s ease-in-out infinite; }

    /* ── Plyr Custom Theme Overrides ─────────────────────────────────── */
    .plyr {
      width: 100%;
      height: 100%;
      background: #000;
      --plyr-color-main: #f43f5e; /* Rose 500 */
      --plyr-video-background: #000;
      --plyr-menu-background: rgba(24, 24, 27, 0.95);
      --plyr-menu-color: #e4e4e7;
    }
    .plyr__controls {
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent) !important;
      backdrop-filter: blur(2px);
    }
    /* Round corners of player wrapper */
    @media (min-width: 640px) {
      .plyr, .plyr__video-wrapper {
        border-radius: 0 0 16px 16px;
      }
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR ─────────────────────────────────────────────────────── -->
  <header class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/90 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
      <a href="/" class="flex items-center gap-2.5 group">
        <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="1" width="4.5" height="12" rx="1"/>
            <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
          </svg>
        </span>
        <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
      </a>
      <div class="flex items-center gap-4">
        <a href="/library/" class="flex items-center gap-1.5 text-sm text-zinc-400 transition hover:text-zinc-200 group">
          <svg class="h-4 w-4 transition-transform group-hover:-translate-x-0.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
          </svg>
          Library
        </a>
        <a href="/about/" class="text-sm text-zinc-500 transition hover:text-zinc-300">About</a>
      </div>
    </div>
  </header>

  <!-- ── MAIN ──────────────────────────────────────────────────────── -->
  <main class="flex flex-1 flex-col pt-14">

    <!-- Video stage -->
    <div class="w-full bg-black">
      <div class="mx-auto max-w-6xl sm:px-6">
        <div class="relative w-full sm:rounded-b-2xl overflow-hidden shadow-2xl shadow-black/80 border-b border-x border-white/[0.06] sm:border-t-0" style="aspect-ratio:16/9">
          <video
            id="videoPlayer"
            playsinline
            controls
            preload="auto"
            crossorigin="anonymous"
          ></video>
        </div>
      </div>
    </div>

    <!-- Metadata -->
    <div class="mx-auto w-full max-w-6xl px-6 py-8 animate-fade-up">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">
        <div class="min-w-0 flex-1">
          <h1 id="videoTitle" class="text-2xl font-bold tracking-tight text-white truncate mb-2">Loading…</h1>
          <div class="flex items-center gap-4 text-sm text-zinc-500 flex-wrap">
            <span class="flex items-center gap-2">
              <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 dot-pulse flex-shrink-0"></span>
              Adaptive HLS · StreamForge Engine
            </span>
            <span id="durationBadge" class="hidden tabular-nums"></span>
          </div>
        </div>

        <!-- Prev / Next -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <button id="prevBtn" onclick="goToPrev()"
            class="flex items-center gap-1.5 rounded-xl border border-white/[0.08] bg-white/[0.04] px-4 py-2 text-sm font-medium text-zinc-400
                   transition hover:bg-white/[0.08] hover:text-zinc-200 disabled:opacity-30 disabled:cursor-not-allowed">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            Previous
          </button>
          <button id="nextBtn" onclick="goToNext()"
            class="flex items-center gap-1.5 rounded-xl border border-white/[0.08] bg-white/[0.04] px-4 py-2 text-sm font-medium text-zinc-400
                   transition hover:bg-white/[0.08] hover:text-zinc-200 disabled:opacity-30 disabled:cursor-not-allowed">
            Next
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.88V8.12L8.5 12zM16 6h2v12h-2z"/></svg>
          </button>
        </div>
      </div>

      <!-- Keyboard hint row -->
      <div class="mt-5 flex flex-wrap gap-x-5 gap-y-2 text-xs text-zinc-600">
        <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">Space</kbd> Play/Pause</span>
        <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">← →</kbd> Seek</span>
        <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">↑ ↓</kbd> Volume</span>
        <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">F</kbd> Fullscreen</span>
        <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">M</kbd> Mute</span>
      </div>

      <div class="mt-6 border-t border-white/[0.06]"></div>
      <div class="mt-5 flex items-center justify-between text-xs text-zinc-700">
        <span>StreamForge · HLS Adaptive Streaming</span>
        <a href="/upload/" class="transition hover:text-zinc-400">Upload another →</a>
      </div>
    </div>
  </main>

  <script>
    let currentVideoData = null;
    let allVideos        = [];
    let currentIndex     = -1;
    let plyrPlayer       = null;
    let hlsInstance      = null;

    function fmt(secs) {
      if (!secs || isNaN(secs)) return '';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    async function loadVideo() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('videoTitle').innerText = 'Video Not Found';
        return;
      }

      const res = await fetch(`/api/videos/${id}/`);
      currentVideoData = await res.json();

      document.getElementById('videoTitle').innerText = currentVideoData.title;

      // Duration badge
      if (currentVideoData.duration) {
        const badge = document.getElementById('durationBadge');
        badge.innerText = fmt(currentVideoData.duration);
        badge.classList.remove('hidden');
      }

      const video = document.getElementById('videoPlayer');
      video.poster = currentVideoData.thumbnail || '';

      // Initialize Plyr + Hls.js
      if (!Hls.isSupported()) {
        video.src = currentVideoData.hls_master;
        plyrPlayer = new Plyr(video, {
          controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
          settings: ['quality', 'speed'],
          speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });
      } else {
        hlsInstance = new Hls();
        hlsInstance.loadSource(currentVideoData.hls_master);
        hlsInstance.attachMedia(video);
        
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
          // Get heights of HLS playlists
          const availableQualities = hlsInstance.levels.map((l) => l.height);
          
          // Initialise Plyr
          plyrPlayer = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed'],
            quality: {
              default: availableQualities[0],
              options: availableQualities,
              forced: true,
              onChange: (newQuality) => {
                hlsInstance.levels.forEach((level, levelIndex) => {
                  if (level.height === newQuality) {
                    hlsInstance.currentLevel = levelIndex;
                  }
                });
              }
            },
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
          });
        });
      }

      // ── Load all videos for prev/next ────────────────────────────
      const allRes = await fetch('/api/videos/');
      allVideos    = await allRes.json();
      currentIndex = allVideos.findIndex(v => v.id === currentVideoData.id);
      updateNavBtns();
    }

    function updateNavBtns() {
      document.getElementById('prevBtn').disabled = currentIndex <= 0;
      document.getElementById('nextBtn').disabled = currentIndex >= allVideos.length - 1;
    }

    function goToPrev() {
      if (currentIndex <= 0) return;
      window.location.href = `/player/?id=${allVideos[currentIndex - 1].id}`;
    }
    function goToNext() {
      if (currentIndex >= allVideos.length - 1) return;
      window.location.href = `/player/?id=${allVideos[currentIndex + 1].id}`;
    }

    loadVideo();
  </script>
</body>
</html>
