<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Player — Adaptive HLS video streaming." />
  <title>StreamForge · Player</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 14 14%22 fill=%22%23f43f5e%22><rect x=%221%22 y=%221%22 width=%224.5%22 height=%2212%22 rx=%221%22/><rect x=%228.5%22 y=%221%22 width=%224.5%22 height=%2212%22 rx=%221%22/></svg>">

  <!-- Plyr CSS & JS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <!-- Hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Tailwind + Inter -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body { font-family: 'Inter', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .dot-pulse { animation: dot-pulse 1.8s ease-in-out infinite; }

    /* ── Plyr Custom Theme Overrides ─────────────────────────────────── */
    .plyr {
      width: 100%;
      height: 100%;
      background: #000;
      --plyr-color-main: #f43f5e; /* Rose 500 */
      --plyr-video-background: #000;
      --plyr-menu-background: rgba(24, 24, 27, 0.95);
      --plyr-menu-color: #e4e4e7;
      border-radius: 16px;
      overflow: hidden;
    }
    .plyr__controls {
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent) !important;
      backdrop-filter: blur(2px);
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR (Dynamic navbar injected via script) ────────────────── -->
  <header id="globalHeader" class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/90 backdrop-blur-md">
  </header>

  <!-- ── MAIN (Redesigned 2-Column Responsive Layout) ───────────────── -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-6 pt-20 animate-fade-up">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Left column: Video player and core controls -->
      <div class="lg:col-span-2 space-y-4">
        <!-- Player stage -->
        <div class="relative w-full rounded-2xl overflow-hidden shadow-2xl shadow-black/85 border border-white/[0.06] bg-black" style="aspect-ratio:16/9">
          <video
            id="videoPlayer"
            playsinline
            controls
            preload="auto"
            crossorigin="anonymous"
          ></video>
        </div>

        <!-- Details block & Navigation Buttons -->
        <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between pt-2">
          <div class="min-w-0 flex-1">
            <h1 id="videoTitle" class="text-2xl font-bold tracking-tight text-white truncate mb-1">Loading…</h1>
            <div class="flex items-center gap-4 text-xs text-zinc-500 flex-wrap">
              <span class="flex items-center gap-2">
                <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 dot-pulse flex-shrink-0"></span>
                Adaptive HLS Transcoded
              </span>
              <span id="durationBadge" class="hidden tabular-nums font-semibold bg-white/[0.06] px-2 py-0.5 rounded text-zinc-400"></span>
            </div>
          </div>

          <!-- Prev / Next Navigation -->
          <div class="flex items-center gap-2 flex-shrink-0">
            <button id="prevBtn" onclick="goToPrev()"
              class="flex items-center gap-1.5 rounded-xl border border-white/[0.08] bg-white/[0.04] px-4 py-2 text-sm font-medium text-zinc-400
                     transition hover:bg-white/[0.08] hover:text-zinc-200 disabled:opacity-30 disabled:cursor-not-allowed">
              <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
              Previous
            </button>
            <button id="nextBtn" onclick="goToNext()"
              class="flex items-center gap-1.5 rounded-xl border border-white/[0.08] bg-white/[0.04] px-4 py-2 text-sm font-medium text-zinc-400
                     transition hover:bg-white/[0.08] hover:text-zinc-200 disabled:opacity-30 disabled:cursor-not-allowed">
              Next
              <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.88V8.12L8.5 12zM16 6h2v12h-2z"/></svg>
            </button>
          </div>
        </div>

        <!-- Shortcuts Help -->
        <div class="border-t border-white/[0.06] pt-4 mt-2">
          <h3 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Player Shortcuts</h3>
          <div class="flex flex-wrap gap-x-5 gap-y-2 text-xs text-zinc-600">
            <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">Space</kbd> Play/Pause</span>
            <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">← →</kbd> Seek</span>
            <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">↑ ↓</kbd> Volume</span>
            <span><kbd class="rounded border border-zinc-700 bg-zinc-800/80 px-1.5 py-0.5 text-zinc-400 font-mono">F</kbd> Fullscreen</span>
          </div>
        </div>
      </div>

      <!-- Right column: Minimalistic Technical Info Side Panel -->
      <div class="space-y-4">
        <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5 space-y-4">
          <h2 class="text-sm font-semibold text-zinc-400 tracking-wider uppercase">Video Metadata</h2>

          <div class="divide-y divide-white/[0.04] text-xs">
            <div class="flex justify-between py-3">
              <span class="text-zinc-500">Resolution</span>
              <span id="metaResolution" class="text-white font-medium">—</span>
            </div>
            <div class="flex justify-between py-3">
              <span class="text-zinc-500">Video Codec</span>
              <span id="metaCodec" class="text-white font-medium">—</span>
            </div>
            <div class="flex justify-between py-3">
              <span class="text-zinc-500">Frame Rate</span>
              <span id="metaFps" class="text-white font-medium">—</span>
            </div>
            <div class="flex justify-between py-3">
              <span class="text-zinc-500">Bitrate</span>
              <span id="metaBitrate" class="text-white font-medium">—</span>
            </div>
            <div class="flex justify-between py-3">
              <span class="text-zinc-500">File size</span>
              <span id="metaSize" class="text-white font-medium">—</span>
            </div>
            <div class="flex justify-between py-3">
              <span class="text-zinc-500">Uploaded by</span>
              <span id="metaOwner" class="text-white font-medium">—</span>
            </div>
          </div>
        </div>

        <div class="rounded-2xl border border-white/[0.06] bg-white/[0.015] p-5 text-center text-xs text-zinc-500 flex flex-col gap-2 items-center justify-center">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <span>Engine: Django + Celery + FFmpeg Transcoder</span>
          <a href="/upload/" class="text-rose-400 hover:text-rose-300 font-medium underline mt-1">Transcode another video</a>
        </div>
      </div>

    </div>
  </main>

  <script>
    let currentVideoData = null;
    let allVideos        = [];
    let currentIndex     = -1;
    let plyrPlayer       = null;
    let hlsInstance      = null;

    // load header dynamically based on login state
    const token = localStorage.getItem('sf_token');
    const header = document.getElementById('globalHeader');
    
    if (token) {
      header.innerHTML = `
        <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
          <a href="/" class="flex items-center gap-2.5 group">
            <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
              <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
                <rect x="1" y="1" width="4.5" height="12" rx="1"/>
                <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
              </svg>
            </span>
            <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
          </a>
          <div class="flex items-center gap-2">
            <a href="/library/" class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">Public Feed</a>
            <a href="/my-videos/" class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">My Studio</a>
            <a href="/upload/" class="flex items-center gap-1.5 rounded-lg bg-rose-600 px-3.5 py-1.5 text-sm font-semibold text-white transition hover:bg-rose-500 active:scale-[0.97]">
              Upload
            </a>
            <button onclick="handleLogout()" class="rounded-lg border border-white/[0.08] bg-white/[0.03] px-3.5 py-1.5 text-sm font-semibold text-zinc-400 transition hover:bg-white/[0.07] hover:text-white">
              Logout
            </button>
          </div>
        </div>
      `;
    } else {
      header.innerHTML = `
        <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
          <a href="/" class="flex items-center gap-2.5 group">
            <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
              <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
                <rect x="1" y="1" width="4.5" height="12" rx="1"/>
                <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
              </svg>
            </span>
            <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
          </a>
          <div class="flex items-center gap-2">
            <a href="/library/" class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">Public Feed</a>
            <a href="/about/" class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">About</a>
            <a href="/login/" class="flex items-center gap-1.5 rounded-lg bg-rose-600 px-3.5 py-1.5 text-sm font-semibold text-white transition hover:bg-rose-500 active:scale-[0.97]">
              Login
            </a>
          </div>
        </div>
      `;
    }

    function handleLogout() {
      localStorage.removeItem('sf_token');
      localStorage.removeItem('sf_username');
      window.location.href = '/about/';
    }

    function fmt(secs) {
      if (!secs || isNaN(secs)) return '';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    async function loadVideo() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('videoTitle').innerText = 'Video Not Found';
        return;
      }

      // attach Bearer auth header if present
      const headers = {};
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const res = await fetch(`/api/videos/${id}/`, { headers });
      currentVideoData = await res.json();

      document.getElementById('videoTitle').innerText = currentVideoData.title;

      // Duration badge
      if (currentVideoData.duration) {
        const badge = document.getElementById('durationBadge');
        badge.innerText = fmt(currentVideoData.duration);
        badge.classList.remove('hidden');
      }

      // Populate metadata side panel fields
      document.getElementById('metaResolution').innerText = currentVideoData.resolution || '—';
      document.getElementById('metaCodec').innerText      = currentVideoData.codec || '—';
      document.getElementById('metaFps').innerText        = currentVideoData.fps || '—';
      document.getElementById('metaBitrate').innerText    = currentVideoData.bitrate || '—';
      document.getElementById('metaSize').innerText       = currentVideoData.original_size_formatted || '—';
      document.getElementById('metaOwner').innerText      = currentVideoData.owner_username || 'anonymous';

      const video = document.getElementById('videoPlayer');
      video.poster = currentVideoData.thumbnail || '';

      // Initialize Plyr + Hls.js
      if (!Hls.isSupported()) {
        video.src = currentVideoData.hls_master;
        plyrPlayer = new Plyr(video, {
          controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
          settings: ['quality', 'speed'],
          keyboard: { focused: false, global: true },
          speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });
      } else {
        hlsInstance = new Hls();
        hlsInstance.loadSource(currentVideoData.hls_master);
        hlsInstance.attachMedia(video);
        
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
          // Get heights of HLS playlists
          const availableQualities = hlsInstance.levels.map((l) => l.height);
          
          // Initialise Plyr
          plyrPlayer = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed'],
            keyboard: { focused: false, global: true },
            quality: {
              default: availableQualities[0],
              options: availableQualities,
              forced: true,
              onChange: (newQuality) => {
                hlsInstance.levels.forEach((level, levelIndex) => {
                  if (level.height === newQuality) {
                    hlsInstance.currentLevel = levelIndex;
                  }
                });
              }
            },
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
          });
        });
      }

      // ── Load all videos for prev/next ────────────────────────────
      const allRes = await fetch('/api/videos/');
      allVideos    = await allRes.json();
      currentIndex = allVideos.findIndex(v => v.id === currentVideoData.id);
      updateNavBtns();
    }

    function updateNavBtns() {
      document.getElementById('prevBtn').disabled = currentIndex <= 0;
      document.getElementById('nextBtn').disabled = currentIndex >= allVideos.length - 1;
    }

    function goToPrev() {
      if (currentIndex <= 0) return;
      window.location.href = `/player/?id=${allVideos[currentIndex - 1].id}`;
    }
    function goToNext() {
      if (currentIndex >= allVideos.length - 1) return;
      window.location.href = `/player/?id=${allVideos[currentIndex + 1].id}`;
    }

    loadVideo();
  </script>
</body>
</html>
