<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Studio — Concurrent multi-video HLS transcoding pipeline." />
  <title>StreamForge · Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }

    .drop-active {
      border-color: rgb(244 63 94 / 0.6) !important;
      background-color: rgb(244 63 94 / 0.05) !important;
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR ───────────────────────────────────────────────────────── -->
  <header class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/80 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
      <a href="/" class="flex items-center gap-2.5 group">
        <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="1" width="4.5" height="12" rx="1"/>
            <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
          </svg>
        </span>
        <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
      </a>
      <nav class="flex items-center gap-1 text-sm">
        <a href="/library/" class="rounded-lg px-3 py-1.5 text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-200">Library</a>
        <a href="/about/"  class="rounded-lg px-3 py-1.5 text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-200">About</a>
        <span class="rounded-lg px-3 py-1.5 text-zinc-300 bg-white/[0.06] font-medium">Studio</span>
      </nav>
    </div>
  </header>

  <!-- ── MAIN ─────────────────────────────────────────────────────────── -->
  <main class="flex flex-1 items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-[560px] animate-fade-up">

      <div class="mb-7">
        <h1 class="text-2xl font-bold tracking-tight text-white">Upload Videos</h1>
        <p class="mt-1 text-sm text-zinc-500">Drop multiple files and process them in parallel using Celery concurrency.</p>
      </div>

      <div class="rounded-2xl border border-white/[0.07] bg-white/[0.025] p-6 shadow-2xl shadow-black/50">

        <!-- drop zone -->
        <div class="mb-6">
          <div
            id="dropZone"
            class="relative cursor-pointer rounded-xl border-2 border-dashed border-white/[0.08] bg-white/[0.02]
                   transition-all duration-200 hover:border-rose-500/40 hover:bg-rose-500/[0.03]"
          >
            <input type="file" id="files" accept="video/*" multiple class="absolute inset-0 h-full w-full cursor-pointer opacity-0 z-10" />
            <div class="pointer-events-none flex flex-col items-center justify-center py-10 px-6 text-center">
              <div id="dropIcon" class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl border border-white/[0.08] bg-white/[0.05] text-rose-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
              </div>
              <p class="text-sm font-medium text-zinc-400">
                Drop videos here or <span class="text-rose-400">browse files</span>
              </p>
              <p class="mt-1 text-xs text-zinc-600">Concurrently transcoded to 1080p &amp; 720p HLS · Max 500MB each</p>
            </div>
          </div>
        </div>

        <!-- parallel uploads list -->
        <div id="pipelineList" class="space-y-3 mb-6 hidden">
          <h3 class="text-xs font-semibold text-zinc-500 tracking-wider uppercase mb-1">Pipeline queue</h3>
        </div>

        <!-- upload button -->
        <button
          onclick="startMultiPipeline()"
          id="uploadBtn"
          class="w-full flex items-center justify-center gap-2 rounded-xl bg-rose-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-900/30
                 transition-all duration-150 hover:bg-rose-500 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed
                 focus:outline-none focus:ring-2 focus:ring-rose-500/50"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
          </svg>
          Start Transcoding
        </button>
      </div>

      <p class="mt-4 text-center text-xs text-zinc-700">Powered by FFmpeg, Redis &amp; Celery</p>
    </div>
  </main>

  <script>
    const dropZone     = document.getElementById('dropZone');
    const fileInput    = document.getElementById('files');
    const pipelineList = document.getElementById('pipelineList');
    const uploadBtn    = document.getElementById('uploadBtn');

    let filesQueue = [];

    // fancy drag drop effects
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drop-active'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drop-active'));
    dropZone.addEventListener('drop',      e => {
      e.preventDefault();
      dropZone.classList.remove('drop-active');
      handleSelectedFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', e => {
      handleSelectedFiles(e.target.files);
    });

    function handleSelectedFiles(filesList) {
      if (filesList.length === 0) return;

      pipelineList.classList.remove('hidden');

      for (let file of filesList) {
        // limit is 500mb
        if (file.size > 524288000) {
          alert(`File "${file.name}" is over 500MB size limit, skipped.`);
          continue;
        }

        // generate random unique tracking ID
        const fileId = 'file-' + Math.random().toString(36).substr(2, 9);
        filesQueue.push({
          id: fileId,
          file: file,
          status: 'queued',
          progress: 0,
          videoId: null
        });

        // append tracking card
        pipelineList.innerHTML += `
          <div id="${fileId}" class="rounded-xl border border-white/[0.05] bg-white/[0.015] p-3.5 transition-all">
            <div class="flex items-center justify-between gap-3 mb-2">
              <span class="text-sm font-medium text-white truncate max-w-[280px]" title="${file.name}">${file.name}</span>
              <span id="${fileId}-percent" class="text-xs font-semibold text-zinc-500 tabular-nums">0%</span>
            </div>
            <div class="h-1.5 w-full rounded-full bg-white/[0.05] overflow-hidden mb-2">
              <div id="${fileId}-bar" class="h-full w-0 bg-rose-600 rounded-full transition-all duration-300"></div>
            </div>
            <div class="flex items-center justify-between text-[11px] font-medium">
              <span id="${fileId}-status" class="text-zinc-500">Queued in pipeline</span>
              <span id="${fileId}-bytes" class="text-zinc-600 tabular-nums">${(file.size / (1024*1024)).toFixed(1)} MB</span>
            </div>
          </div>
        `;
      }
    }

    async function startMultiPipeline() {
      const activeJobs = filesQueue.filter(j => j.status === 'queued');
      if (activeJobs.length === 0) return alert("Select files first.");

      uploadBtn.disabled = true;
      uploadBtn.classList.add('opacity-40', 'cursor-not-allowed');

      // upload everything together
      activeJobs.forEach(job => {
        uploadFile(job);
      });
    }

    function uploadFile(job) {
      job.status = 'uploading';
      const statusEl = document.getElementById(`${job.id}-status`);
      const percentEl = document.getElementById(`${job.id}-percent`);
      const barEl = document.getElementById(`${job.id}-bar`);

      statusEl.innerText = "Uploading to server...";
      statusEl.classList.replace('text-zinc-500', 'text-rose-400');

      const formData = new FormData();
      const rawTitle = job.file.name.replace(/\.[^/.]+$/, "");
      formData.append('title', rawTitle);
      formData.append('original_file', job.file);

      const xhr = new XMLHttpRequest();

      // track upload percentage
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const percent = Math.round((e.loaded / e.total) * 100);
          job.progress = percent;
          barEl.style.width = percent + '%';
          percentEl.innerText = percent + '%';
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status === 201) {
          const responseData = JSON.parse(xhr.responseText);
          job.status = 'processing';
          job.videoId = responseData.id;
          
          statusEl.innerText = "Transcoding in worker queue...";
          statusEl.className = "text-amber-400 animate-pulse";
          barEl.className = "h-full w-full bg-gradient-to-r from-amber-500 to-yellow-500 animate-pulse rounded-full";
          percentEl.innerText = "Processing";

          pollProcessingStatus(job);
        } else {
          job.status = 'failed';
          statusEl.innerText = "Upload failed.";
          statusEl.className = "text-red-500";
          barEl.className = "h-full w-full bg-red-600 rounded-full";
          percentEl.innerText = "Error";
        }
      });

      xhr.open('POST', '/api/videos/', true);
      xhr.setRequestHeader('X-CSRFToken', getCookie('csrftoken'));
      xhr.send(formData);
    }

    // poll transcode stages from database
    function pollProcessingStatus(job) {
      const statusEl = document.getElementById(`${job.id}-status`);
      const percentEl = document.getElementById(`${job.id}-percent`);
      const barEl = document.getElementById(`${job.id}-bar`);

      const statusMap = {
        'analyzing':         'Analyzing metadata (ffprobe)…',
        'transcoding_1080p': 'Encoding HLS 1080p Stream…',
        'transcoding_720p':  'Encoding HLS 720p Stream…',
        'generating_assets': 'Generating tiles & thumbnail…'
      };

      const interval = setInterval(async () => {
        const res = await fetch(`/api/videos/${job.videoId}/`);
        const data = await res.json();

        if (statusMap[data.status]) {
          statusEl.innerText = statusMap[data.status];
        }

        if (data.status === 'done') {
          clearInterval(interval);
          job.status = 'done';
          statusEl.innerHTML = `<span class="text-emerald-400">Complete! <a href="/player/?id=${job.videoId}" class="underline hover:text-white ml-1.5 font-bold">Watch &rarr;</a></span>`;
          statusEl.className = "";
          barEl.className = "h-full w-full bg-gradient-to-r from-emerald-500 to-green-500 rounded-full";
          percentEl.innerText = "Success";
          checkAllJobsFinished();
        } else if (data.status === 'failed') {
          clearInterval(interval);
          job.status = 'failed';
          statusEl.innerText = "Transcoding pipeline failed.";
          statusEl.className = "text-red-500";
          barEl.className = "h-full w-full bg-red-600 rounded-full";
          percentEl.innerText = "Failed";
          checkAllJobsFinished();
        }
      }, 2000);
    }

    function checkAllJobsFinished() {
      const pendingJobs = filesQueue.filter(j => ['queued', 'uploading', 'processing'].includes(j.status));
      if (pendingJobs.length === 0) {
        uploadBtn.disabled = false;
        uploadBtn.innerText = "Start Transcoding";
        uploadBtn.classList.remove('opacity-40', 'cursor-not-allowed');
      }
    }

    // pull csrf cookie
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
  </script>
</body>
</html>
