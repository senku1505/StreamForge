<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Studio — Concurrent multi-video HLS transcoding pipeline." />
  <title>StreamForge · Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 14 14%22 fill=%22%23f43f5e%22><rect x=%221%22 y=%221%22 width=%224.5%22 height=%2212%22 rx=%221%22/><rect x=%228.5%22 y=%221%22 width=%224.5%22 height=%2212%22 rx=%221%22/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }

    .drop-active {
      border-color: rgb(244 63 94 / 0.6) !important;
      background-color: rgb(244 63 94 / 0.05) !important;
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR (Dynamic navbar injected via script) ────────────────── -->
  <header id="globalHeader" class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/80 backdrop-blur-md">
  </header>

  <!-- ── MAIN ─────────────────────────────────────────────────────────── -->
  <main class="flex flex-1 items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-[560px] animate-fade-up">

      <div class="mb-7">
        <h1 class="text-2xl font-bold tracking-tight text-white">Upload Videos</h1>
        <p class="mt-1 text-sm text-zinc-500">Drop multiple files and process them in parallel using Celery concurrency.</p>
      </div>

      <div class="rounded-2xl border border-white/[0.07] bg-white/[0.025] p-6 shadow-2xl shadow-black/50">

        <!-- drop zone -->
        <div class="mb-6">
          <div
            id="dropZone"
            class="relative cursor-pointer rounded-xl border-2 border-dashed border-white/[0.08] bg-white/[0.02]
                   transition-all duration-200 hover:border-rose-500/40 hover:bg-rose-500/[0.03]"
          >
            <input type="file" id="files" accept="video/*" multiple class="absolute inset-0 h-full w-full cursor-pointer opacity-0 z-10" />
            <div class="pointer-events-none flex flex-col items-center justify-center py-10 px-6 text-center">
              <div id="dropIcon" class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl border border-white/[0.08] bg-white/[0.05] text-rose-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
              </div>
              <p class="text-sm font-medium text-zinc-400">
                Drop videos here or <span class="text-rose-400">browse files</span>
              </p>
              <p class="mt-1 text-xs text-zinc-600">Concurrently transcoded to 1080p &amp; 720p HLS · Max 500MB each</p>
            </div>
          </div>
        </div>

        <!-- parallel uploads list -->
        <div id="pipelineList" class="space-y-3 mb-6 hidden">
          <h3 class="text-xs font-semibold text-zinc-500 tracking-wider uppercase mb-1">Pipeline queue</h3>
        </div>

        <!-- upload button -->
        <button
          onclick="startMultiPipeline()"
          id="uploadBtn"
          class="w-full flex items-center justify-center gap-2 rounded-xl bg-rose-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-900/30
                 transition-all duration-150 hover:bg-rose-500 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed
                 focus:outline-none focus:ring-2 focus:ring-rose-500/50"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
          </svg>
          Start Transcoding
        </button>
      </div>

      <p class="mt-4 text-center text-xs text-zinc-700">Powered by FFmpeg, Redis &amp; Celery</p>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('sf_token');
    if (!token) { window.location.href = '/login/'; }

    document.getElementById('globalHeader').innerHTML = `
      <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
        <a href="/about/" class="flex items-center gap-2.5 group">
          <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50">
            <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
              <rect x="1" y="1" width="4.5" height="12" rx="1"/>
              <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
            </svg>
          </span>
          <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
        </a>
        <div class="flex items-center gap-2">
          <a href="/library/"   class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">Public Feed</a>
          <a href="/my-videos/" class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-300">My Studio</a>
          <span class="rounded-lg px-3 py-1.5 text-sm font-medium text-zinc-300 bg-white/[0.06]">Upload</span>
          <button onclick="handleLogout()" class="rounded-lg border border-white/[0.08] bg-white/[0.03] px-3.5 py-1.5 text-sm font-semibold text-zinc-400 transition hover:bg-white/[0.07] hover:text-white">Logout</button>
        </div>
      </div>
    `;

    function handleLogout() {
      localStorage.removeItem('sf_token');
      localStorage.removeItem('sf_username');
      window.location.href = '/about/';
    }

    const dropZone     = document.getElementById('dropZone');
    const fileInput    = document.getElementById('files');
    const pipelineList = document.getElementById('pipelineList');
    const uploadBtn    = document.getElementById('uploadBtn');
    let   filesQueue   = [];

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drop-active'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drop-active'));
    dropZone.addEventListener('drop',      e => { e.preventDefault(); dropZone.classList.remove('drop-active'); handleSelectedFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change',   e => handleSelectedFiles(e.target.files));

    function handleSelectedFiles(filesList) {
      if (!filesList.length) return;
      pipelineList.classList.remove('hidden');
      for (const file of filesList) {
        if (file.size > 524288000) { alert('"' + file.name + '" exceeds 500 MB — skipped.'); continue; }
        const jid = 'job-' + Math.random().toString(36).slice(2, 11);
        filesQueue.push({ id: jid, file, status: 'queued', videoId: null });
        pipelineList.innerHTML += '<div id="' + jid + '" class="rounded-xl border border-white/[0.05] bg-white/[0.015] p-3.5"><div class="flex items-center justify-between gap-3 mb-2"><span class="text-sm font-medium text-white truncate max-w-[280px]">' + file.name + '</span><span id="' + jid + '-pct" class="text-xs font-semibold text-zinc-500 tabular-nums">0%</span></div><div class="h-1.5 w-full rounded-full bg-white/[0.05] overflow-hidden mb-2"><div id="' + jid + '-bar" class="h-full w-0 bg-rose-600 rounded-full transition-all duration-300"></div></div><div class="flex items-center justify-between text-[11px] font-medium"><span id="' + jid + '-status" class="text-zinc-500">Queued</span><span class="text-zinc-600 tabular-nums">' + (file.size / 1048576).toFixed(1) + ' MB</span></div></div>';
      }
    }

    function startMultiPipeline() {
      const queued = filesQueue.filter(j => j.status === 'queued');
      if (!queued.length) { alert('Select files first.'); return; }
      uploadBtn.disabled = true;
      uploadBtn.classList.add('opacity-40', 'cursor-not-allowed');
      uploadBtn.innerText = 'Uploading\u2026';
      queued.forEach(uploadFile);
    }

    function uploadFile(job) {
      job.status = 'uploading';
      const sEl = document.getElementById(job.id + '-status');
      const pEl = document.getElementById(job.id + '-pct');
      const bEl = document.getElementById(job.id + '-bar');
      sEl.innerText = 'Uploading\u2026';
      sEl.className = 'text-rose-400';
      const fd = new FormData();
      fd.append('title', job.file.name.replace(/\.[^/.]+$/, ''));
      fd.append('original_file', job.file);
      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) { const p = Math.round((e.loaded / e.total) * 100); bEl.style.width = p + '%'; pEl.innerText = p + '%'; }
      });
      xhr.addEventListener('load', () => {
        if (xhr.status === 201) {
          const d = JSON.parse(xhr.responseText);
          job.status = 'processing'; job.videoId = d.id;
          sEl.innerText = 'Queued for transcoding\u2026';
          sEl.className = 'text-amber-400 animate-pulse';
          bEl.className = 'h-full w-full bg-gradient-to-r from-amber-500 to-yellow-500 animate-pulse rounded-full';
          pEl.innerText = 'Processing';
          checkUploadsDone();
          pollStatus(job);
        } else if (xhr.status === 401) {
          handleLogout();
        } else {
          job.status = 'failed';
          sEl.innerText = 'Upload failed.'; sEl.className = 'text-red-500';
          bEl.className = 'h-full w-full bg-red-600 rounded-full'; pEl.innerText = 'Error';
          checkUploadsDone();
        }
      });
      xhr.open('POST', '/api/videos/', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.send(fd);
    }

    function pollStatus(job) {
      const sEl = document.getElementById(job.id + '-status');
      const pEl = document.getElementById(job.id + '-pct');
      const bEl = document.getElementById(job.id + '-bar');
      const LABELS = { analyzing: 'Analyzing metadata\u2026', transcoding_1080p: 'Encoding 1080p + 720p\u2026', transcoding_720p: 'Encoding 1080p + 720p\u2026', generating_assets: 'Generating thumbnail & sprite\u2026' };
      const timer = setInterval(async () => {
        try {
          const res = await fetch('/api/videos/' + job.videoId + '/');
          if (res.status === 401) { clearInterval(timer); handleLogout(); return; }
          const data = await res.json();
          if (LABELS[data.status]) sEl.innerText = LABELS[data.status];
          if (data.status === 'done') {
            clearInterval(timer); job.status = 'done';
            sEl.innerHTML = '<span class="text-emerald-400">\u2713 Done! <a href="/player/?id=' + job.videoId + '" class="underline hover:text-white ml-1 font-bold">Watch \u2192</a></span>';
            sEl.className = ''; bEl.className = 'h-full w-full bg-gradient-to-r from-emerald-500 to-green-500 rounded-full'; pEl.innerText = '\u2713';
          } else if (data.status === 'failed') {
            clearInterval(timer); job.status = 'failed';
            sEl.innerText = 'Transcoding failed.'; sEl.className = 'text-red-500';
            bEl.className = 'h-full w-full bg-red-600 rounded-full'; pEl.innerText = '\u2717';
          }
        } catch (err) { console.error('[poll]', err); }
      }, 2000);
    }

    function checkUploadsDone() {
      const busy = filesQueue.some(j => j.status === 'uploading' || j.status === 'queued');
      if (!busy) { uploadBtn.disabled = false; uploadBtn.classList.remove('opacity-40', 'cursor-not-allowed'); uploadBtn.innerText = 'Start Transcoding'; }
    }
  </script>
</body>
</html>
