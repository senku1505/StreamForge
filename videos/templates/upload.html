<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>StreamForge | Studio</title>
</head>

<body
    class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black">

    <div
        class="w-full max-w-lg bg-slate-800/50 backdrop-blur-xl p-8 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-slate-700">
        <div class="flex items-center space-x-3 mb-8">
            <div class="h-8 w-8 bg-gradient-to-br from-rose-500 to-red-700 rounded-lg shadow-lg shadow-red-500/30">
            </div>
            <h2
                class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 tracking-tight">
                StreamForge Studio</h2>
        </div>

        <input type="text" id="title" placeholder="Project Title..."
            class="w-full mb-5 p-4 bg-slate-900/50 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-rose-500 transition-all placeholder-slate-500">

        <div class="relative group cursor-pointer">
            <input type="file" id="file" accept="video/*"
                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            <div
                class="w-full mb-6 p-8 border-2 border-dashed border-slate-600 rounded-xl bg-slate-900/30 text-center group-hover:border-rose-500 group-hover:bg-slate-900/50 transition-all">
                <p class="text-slate-400 font-medium" id="fileName">Drag & drop video or click to browse</p>
            </div>
        </div>

        <div id="progressContainer" class="hidden mb-6">
            <div class="flex justify-between text-sm font-medium mb-2">
                <span id="progressText" class="text-rose-400">Uploading...</span>
                <span id="progressPercent" class="text-slate-400">0%</span>
            </div>
            <div class="w-full bg-slate-900 rounded-full h-2.5 border border-slate-700 overflow-hidden">
                <div id="progressBar"
                    class="bg-gradient-to-r from-rose-600 to-red-500 h-2.5 rounded-full w-0 transition-all duration-300">
                </div>
            </div>
        </div>

        <button onclick="startPipeline()" id="uploadBtn"
            class="w-full bg-gradient-to-r from-rose-600 to-red-700 hover:from-rose-500 hover:to-red-600 p-4 rounded-xl font-bold text-white shadow-lg shadow-red-900/50 transform hover:-translate-y-0.5 transition-all">
            Initialize Pipeline
        </button>
    </div>

    <script>
        // Update filename text when selected
        document.getElementById('file').addEventListener('change', function (e) {
            if (e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name;
        });

        function startPipeline() {
            const title = document.getElementById('title').value;
            const fileInput = document.getElementById('file').files[0];
            const btn = document.getElementById('uploadBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const progressText = document.getElementById('progressText');

            if (!title || !fileInput) return alert("Title and Media required.");

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            progressContainer.classList.remove('hidden');

            const formData = new FormData();
            formData.append('title', title);
            formData.append('original_file', fileInput);

            // Using XHR for exact upload percentage
            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', function (e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percentComplete + '%';
                    progressPercent.innerText = percentComplete + '%';
                }
            });

            xhr.addEventListener('load', function () {
                if (xhr.status === 201) {
                    const data = JSON.parse(xhr.responseText);
                    progressText.innerText = "Transcoding in Celery Worker...";
                    progressText.classList.replace('text-rose-400', 'text-amber-400');
                    progressBar.classList.replace('from-rose-600', 'from-amber-500');
                    progressBar.classList.replace('to-red-500', 'to-yellow-400');
                    progressBar.classList.add('animate-pulse');
                    pollStatus(data.id);
                } else {
                    progressText.innerText = "Upload Failed.";
                    progressText.classList.replace('text-rose-400', 'text-red-500');
                }
            });

            xhr.open('POST', '/api/videos/', true);
            xhr.send(formData);
        }

        function pollStatus(id) {
            const progressText = document.getElementById('progressText');
            const btn = document.getElementById('uploadBtn');

            const interval = setInterval(async () => {
                const res = await fetch(`/api/videos/${id}/`);
                const data = await res.json();

                if (data.status === 'done') {
                    clearInterval(interval);
                    document.getElementById('progressBar').classList.remove('animate-pulse');
                    document.getElementById('progressBar').classList.replace('from-amber-500', 'from-emerald-500');
                    document.getElementById('progressBar').classList.replace('to-yellow-400', 'to-green-400');
                    progressText.innerHTML = `<span class="text-emerald-400">Pipeline Complete! <a href="/player/?id=${data.id}" class="underline hover:text-white ml-2">Watch Now &rarr;</a></span>`;
                    btn.innerText = "Process Another";
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else if (data.status === 'failed') {
                    clearInterval(interval);
                    progressText.innerHTML = `<span class="text-red-500">FFmpeg Error. Check Worker Logs.</span>`;
                }
            }, 2000);
        }
    </script>
</body>

</html>
