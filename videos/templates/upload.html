<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamForge Studio — Upload and transcode your videos with a single click." />
  <title>StreamForge · Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }

    /* Drop-zone active state toggled by JS */
    .drop-active {
      border-color: rgb(244 63 94 / 0.6) !important;
      background-color: rgb(244 63 94 / 0.05) !important;
    }
    .drop-active #dropIcon { color: #f43f5e; }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-200 min-h-screen antialiased flex flex-col">

  <!-- ── NAVBAR ───────────────────────────────────────────────────────── -->
  <header class="fixed inset-x-0 top-0 z-50 h-14 border-b border-white/[0.06] bg-[#09090b]/80 backdrop-blur-md">
    <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-5">
      <a href="/" class="flex items-center gap-2.5 group">
        <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-rose-500 to-rose-700 shadow shadow-rose-900/50 transition-shadow group-hover:shadow-rose-500/40">
          <!-- logo bars -->
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="1" width="4.5" height="12" rx="1"/>
            <rect x="8.5" y="1" width="4.5" height="12" rx="1"/>
          </svg>
        </span>
        <span class="text-[15px] font-semibold tracking-tight text-white">StreamForge</span>
      </a>
      <nav class="flex items-center gap-1 text-sm">
        <a href="/library/" class="rounded-lg px-3 py-1.5 text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-200">Library</a>
        <a href="/about/"  class="rounded-lg px-3 py-1.5 text-zinc-500 transition hover:bg-white/[0.06] hover:text-zinc-200">About</a>
        <span class="rounded-lg px-3 py-1.5 text-zinc-300 bg-white/[0.06] font-medium">Studio</span>
      </nav>
    </div>
  </header>

  <!-- ── MAIN ─────────────────────────────────────────────────────────── -->
  <main class="flex flex-1 items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-[480px] animate-fade-up">

      <!-- Heading -->
      <div class="mb-7">
        <h1 class="text-2xl font-bold tracking-tight text-white">New upload</h1>
        <p class="mt-1 text-sm text-zinc-500">Transcoded to adaptive HLS (720p &amp; 480p) automatically via Celery.</p>
      </div>

      <!-- Form card -->
      <div class="rounded-2xl border border-white/[0.07] bg-white/[0.025] p-6 shadow-2xl shadow-black/50">

        <!-- Title -->
        <div class="mb-4">
          <label for="title" class="mb-1.5 block text-xs font-medium text-zinc-400">Title</label>
          <input
            type="text"
            id="title"
            placeholder="e.g. Product Demo v2"
            autocomplete="off"
            class="w-full rounded-xl border border-white/[0.08] bg-white/[0.04] px-4 py-2.5 text-sm text-white placeholder-zinc-600
                   outline-none transition duration-150
                   focus:border-rose-500/50 focus:bg-white/[0.06] focus:ring-2 focus:ring-rose-500/20"
          />
        </div>

        <!-- Drop zone -->
        <div class="mb-5">
          <label class="mb-1.5 block text-xs font-medium text-zinc-400">Media file</label>
          <div
            id="dropZone"
            class="relative cursor-pointer rounded-xl border-2 border-dashed border-white/[0.08] bg-white/[0.02]
                   transition-all duration-200 hover:border-rose-500/40 hover:bg-rose-500/[0.03]"
          >
            <input type="file" id="file" accept="video/*" class="absolute inset-0 h-full w-full cursor-pointer opacity-0 z-10" />
            <div class="pointer-events-none flex flex-col items-center justify-center py-9 px-6 text-center">
              <div id="dropIcon" class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl border border-white/[0.08] bg-white/[0.05] text-zinc-400 transition-colors">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/>
                </svg>
              </div>
              <p id="fileName" class="text-sm font-medium text-zinc-400">
                Drop video here or <span class="text-rose-400">browse files</span>
              </p>
              <p class="mt-1 text-xs text-zinc-600">MP4, MOV, MKV, AVI — any resolution</p>
            </div>
          </div>
        </div>

        <!-- Progress (hidden by default) -->
        <div id="progressContainer" class="hidden mb-5 rounded-xl border border-white/[0.07] bg-white/[0.03] px-4 py-3.5">
          <div class="mb-2 flex items-center justify-between">
            <span id="progressText" class="text-xs font-medium text-rose-400">Uploading…</span>
            <span id="progressPercent" class="text-xs font-medium tabular-nums text-zinc-500">0%</span>
          </div>
          <div class="h-1.5 w-full overflow-hidden rounded-full bg-white/[0.06]">
            <div
              id="progressBar"
              class="h-full w-0 rounded-full bg-gradient-to-r from-rose-600 to-rose-400 transition-all duration-300"
            ></div>
          </div>
        </div>

        <!-- CTA -->
        <button
          onclick="startPipeline()"
          id="uploadBtn"
          class="w-full flex items-center justify-center gap-2 rounded-xl bg-rose-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-rose-900/30
                 transition-all duration-150 hover:bg-rose-500 active:scale-[0.98]
                 focus:outline-none focus:ring-2 focus:ring-rose-500/50 focus:ring-offset-2 focus:ring-offset-[#09090b]"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
          </svg>
          Initialize Pipeline
        </button>
      </div>

      <p class="mt-4 text-center text-xs text-zinc-700">Powered by FFmpeg &amp; Celery · Processing runs in the background</p>
    </div>
  </main>

  <!-- ── SCRIPTS (logic 100% untouched) ──────────────────────────────── -->
  <script>
    // Drop-zone drag feedback
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drop-active'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drop-active'));
    dropZone.addEventListener('drop',      ()  => dropZone.classList.remove('drop-active'));

    // Update filename text when selected
    document.getElementById('file').addEventListener('change', function (e) {
        if (e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name;
    });

    function startPipeline() {
        const title = document.getElementById('title').value;
        const fileInput = document.getElementById('file').files[0];
        const btn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const progressText = document.getElementById('progressText');

        if (!title || !fileInput) return alert("Title and Media required.");

        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
        progressContainer.classList.remove('hidden');

        const formData = new FormData();
        formData.append('title', title);
        formData.append('original_file', fileInput);

        // Using XHR for exact upload percentage
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', function (e) {
            if (e.lengthComputable) {
                const percentComplete = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percentComplete + '%';
                progressPercent.innerText = percentComplete + '%';
            }
        });

        xhr.addEventListener('load', function () {
            if (xhr.status === 201) {
                const data = JSON.parse(xhr.responseText);
                progressText.innerText = "Transcoding in Celery Worker...";
                progressText.classList.replace('text-rose-400', 'text-amber-400');
                progressBar.classList.replace('from-rose-600', 'from-amber-500');
                progressBar.classList.replace('to-rose-400', 'to-yellow-400');
                progressBar.classList.add('animate-pulse');
                pollStatus(data.id);
            } else {
                progressText.innerText = "Upload Failed.";
                progressText.classList.replace('text-rose-400', 'text-red-500');
            }
        });

        xhr.open('POST', '/api/videos/', true);
        xhr.send(formData);
    }

    function pollStatus(id) {
        const progressText = document.getElementById('progressText');
        const btn = document.getElementById('uploadBtn');

        const interval = setInterval(async () => {
            const res = await fetch(`/api/videos/${id}/`);
            const data = await res.json();

            if (data.status === 'done') {
                clearInterval(interval);
                document.getElementById('progressBar').classList.remove('animate-pulse');
                document.getElementById('progressBar').classList.replace('from-amber-500', 'from-emerald-500');
                document.getElementById('progressBar').classList.replace('to-yellow-400', 'to-green-400');
                progressText.innerHTML = `<span class="text-emerald-400">Pipeline Complete! <a href="/player/?id=${data.id}" class="underline hover:text-white ml-2">Watch Now &rarr;</a></span>`;
                btn.innerText = "Process Another";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else if (data.status === 'failed') {
                clearInterval(interval);
                progressText.innerHTML = `<span class="text-red-500">FFmpeg Error. Check Worker Logs.</span>`;
            }
        }, 2000);
    }
  </script>
</body>

</html>
